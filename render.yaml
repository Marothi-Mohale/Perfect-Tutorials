# Render Blueprint for the Perfect Tutorials monorepo.
# The default onrender.com hostnames below assume you keep these service names.
# If you rename a service or add a custom domain, update the related URL env vars.
services:
  - type: web
    runtime: docker
    name: perfect-tutorials-web
    plan: free
    rootDir: perfect-tutorials
    dockerContext: ./perfect-tutorials
    dockerfilePath: ./perfect-tutorials/apps/web/Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_SITE_URL
        value: https://perfect-tutorials-web.onrender.com
      - key: NEXT_PUBLIC_API_BASE_URL
        value: /backend-api
      - key: INTERNAL_API_BASE_URL
        value: https://perfect-tutorials-api.onrender.com/api
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL
        value: /dashboard
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL
        value: /dashboard
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false

  - type: web
    runtime: docker
    name: perfect-tutorials-api
    plan: free
    rootDir: perfect-tutorials
    dockerContext: ./perfect-tutorials
    dockerfilePath: ./perfect-tutorials/apps/api/Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://perfect-tutorials-web.onrender.com
      - key: CORS_ORIGINS
        value: https://perfect-tutorials-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: perfect-tutorials-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_INQUIRY_TO_EMAIL
        sync: false
      - key: RESEND_SEND_STUDENT_CONFIRMATION
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: perfect-tutorials-db
    plan: free
    databaseName: perfect_tutorials
